apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: routing-sim-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: routing-sim.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: routing-sim-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: routing-sim-frontend
                port:
                  number: 80
