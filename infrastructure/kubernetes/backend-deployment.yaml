apiVersion: apps/v1
kind: Deployment
metadata:
  name: routing-sim-backend
  labels:
    app: routing-sim
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: routing-sim
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: routing-sim
        component: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/user/cloud-routing-simulator-backend:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
