apiVersion: apps/v1
kind: Deployment
metadata:
  name: routing-sim-frontend
  labels:
    app: routing-sim
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: routing-sim
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: routing-sim
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/user/cloud-routing-simulator-frontend:latest
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
